<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Bucket-palette stripe at top-left -->
  <circle cx="92"  cy="100" r="22" fill="#d93a3a"/>
  <circle cx="148" cy="100" r="22" fill="#e6b422"/>
  <circle cx="204" cy="100" r="22" fill="#2f9e44"/>
  <circle cx="260" cy="100" r="22" fill="#7c3aed"/>
  <circle cx="316" cy="100" r="22" fill="#4a5058"/>

  <!-- Title -->
  <text x="92" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="78" font-weight="700" fill="#1b1d1e" letter-spacing="-2">Jersey Village 2026</text>
  <text x="92" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="78" font-weight="700" fill="#1b1d1e" letter-spacing="-2">HCAD Appeals</text>

  <!-- Tagline -->
  <text x="92" y="425" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="34" font-weight="400" fill="#5a6067">Find your home. See if you should file.</text>

  <!-- JV badge (matches favicon, scaled) -->
  <circle cx="1020" cy="320" r="135" fill="#d93a3a"/>
  <text x="1020" y="370" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="135" font-weight="800" fill="#ffffff" text-anchor="middle"
        letter-spacing="-5">JV</text>

  <!-- URL footer -->
  <line x1="92" y1="545" x2="1108" y2="545" stroke="#e3e6ea" stroke-width="2"/>
  <text x="92" y="585" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26" font-weight="600" fill="#1b6fe6">jvtaxappeal.com</text>
  <text x="1108" y="585" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="22" font-weight="400" fill="#5a6067" text-anchor="end">Built by a neighbor</text>
</svg>
